name: Build Linux Packages

on:
  push:
    tags:
      - "v*"

jobs:
  packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install package builders
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build binary
        run: cargo build --release

      - name: Build .deb
        run: cargo deb

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Push .deb to Packagecloud
        run: |
          sudo gem install package_cloud
          DEB=$(ls target/debian/*.deb | head -n1)
          package_cloud push bacteriafield/speedtest/any/any "$DEB"
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Push .rpm to Packagecloud
        run: |
          sudo gem install package_cloud
          RPM=$(ls target/generate-rpm/*.rpm | head -n1)
          package_cloud push bacteriafield/speedtest/rpm_any/rpm_any "$RPM"
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm