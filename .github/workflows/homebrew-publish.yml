name: Publish Homebrew Formula

on:
  release:
    types: [published]

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: bacteriafield/homebrew-speedtest
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download release tarball and compute SHA
        id: sha
        run: |
          TARBALL="https://github.com/bacteriafield/speedtest/archive/refs/tags/${{ github.event.release.tag_name }}.tar.gz"
          curl -sL "$TARBALL" -o source.tar.gz
          SHA=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Update Formula
        run: |
          cat > Formula/speedtest.rb <<EOF
          class Speedtest < Formula
            desc "Fast terminal speedtest"
            homepage "https://github.com/bacteriafield/speedtest"
            url "${{ steps.sha.outputs.tarball }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match "speedtest", shell_output("#{bin}/speedtest --help")
            end
          end
          EOF

      - name: Commit and push Formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/speedtest.rb
          git commit -m "Update formula to ${{ github.event.release.tag_name }}" || echo "No changes"
          git push
